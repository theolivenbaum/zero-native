name: .NET

# Workflow disabled: triggers reduced to manual-only (workflow_dispatch).
# To re-enable automatic CI, restore the pull_request / push triggers below.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ matrix.os }} build + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

      # Smoke test: publish the WebView sample for the matrix RID so we catch
      # platform-specific regressions (missing native dependencies, broken
      # MSBuild targets, RID-only failures) before they reach consumers. The
      # WebView2 reference and the macOS .app bundle target both exercise here.
      - name: Smoke-publish sample (${{ matrix.rid }})
        run: dotnet publish samples/ZeroNative.Sample/ZeroNative.Sample.csproj -c Release -r ${{ matrix.rid }} -o ./smoke/${{ matrix.rid }}

  pack:
    name: Pack NuGets
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve package version
        id: resolve-version
        shell: bash
        run: |
          # Pull the version from the pushed tag (vX.Y.Z[-pre][+build]); for branch
          # builds emit a pre-release suffix so artifacts are uniquely identifiable.
          # Override with ZERO_NATIVE_VERSION env when needed.
          if [[ -n "${ZERO_NATIVE_VERSION:-}" ]]; then
            version="${ZERO_NATIVE_VERSION}"
          elif [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          elif [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            version="${GITHUB_REF#refs/tags/}"
          else
            short_sha="${GITHUB_SHA:0:7}"
            version="0.1.0-dev.${GITHUB_RUN_NUMBER:-0}.${short_sha}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Resolved package version: ${version}"

      - name: Restore
        run: dotnet restore

      - name: Pack Core
        run: dotnet pack -c Release --no-restore -p:Version=${{ steps.resolve-version.outputs.version }} src/ZeroNative.Core/ZeroNative.Core.csproj -o ./artifacts

      - name: Pack ZeroNative
        run: dotnet pack -c Release --no-restore -p:Version=${{ steps.resolve-version.outputs.version }} src/ZeroNative/ZeroNative.csproj -o ./artifacts

      - name: Pack ZeroNative.Cef
        run: dotnet pack -c Release --no-restore -p:Version=${{ steps.resolve-version.outputs.version }} src/ZeroNative.Cef/ZeroNative.Cef.csproj -o ./artifacts

      - name: Pack ZeroNative.Templates
        run: dotnet pack -c Release --no-restore -p:Version=${{ steps.resolve-version.outputs.version }} src/ZeroNative.Templates/ZeroNative.Templates.csproj -o ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./artifacts/*.nupkg

  docs:
    name: Build docs (Neko)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Neko
        run: dotnet tool install --global Neko

      - name: Build docs site
        working-directory: docs
        run: neko build -o .neko

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/.neko

name: .NET

# Workflow disabled: triggers reduced to manual-only (workflow_dispatch).
# To re-enable automatic CI, restore the pull_request / push triggers below.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ matrix.os }} build + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

  pack:
    name: Pack NuGets
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Pack Core
        run: dotnet pack -c Release --no-restore src/ZeroNative.Core/ZeroNative.Core.csproj -o ./artifacts

      - name: Pack ZeroNative
        run: dotnet pack -c Release --no-restore src/ZeroNative/ZeroNative.csproj -o ./artifacts

      - name: Pack ZeroNative.Cef
        run: dotnet pack -c Release --no-restore src/ZeroNative.Cef/ZeroNative.Cef.csproj -o ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./artifacts/*.nupkg
